name: agent_room

services:
    postgres:
        image: postgres:17-alpine
        container_name: agent-room-postgres
        environment:
            POSTGRES_DB: agent_room
            POSTGRES_USER: agent_room
            POSTGRES_PASSWORD: ${AGENT_ROOM_POSTGRES_PASSWORD:-agent_room}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U agent_room -d agent_room']
            interval: 5s
            timeout: 5s
            retries: 10

    searxng:
        image: searxng/searxng:${AGENT_ROOM_SEARXNG_TAG:-2026.5.2-aefc3c316}
        container_name: agent-room-searxng
        entrypoint: ['/bin/sh', '/usr/local/bin/agent-room-searxng-entrypoint.sh']
        environment:
            SEARXNG_BASE_URL: http://searxng:8080/
            SEARXNG_LIMITER: 'false'
            SEARXNG_PUBLIC_INSTANCE: 'false'
        expose:
            - '8080'
        volumes:
            - searxng-config:/etc/searxng
            - ./infra/searxng/entrypoint.sh:/usr/local/bin/agent-room-searxng-entrypoint.sh:ro
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: agent-room-app
        depends_on:
            postgres:
                condition: service_healthy
            searxng:
                condition: service_started
        ports:
            - '127.0.0.1:${AGENT_ROOM_PORT:-3000}:3000'
        environment:
            - NODE_ENV=production
            - PORT=3000
            - DATABASE_URL=postgres://agent_room:${AGENT_ROOM_POSTGRES_PASSWORD:-agent_room}@postgres:5432/agent_room?sslmode=disable
            - AGENT_ROOM_DATA_DIR=/app/.agent-room
            - AGENT_ROOM_SEARCH_BACKEND_URL=http://searxng:8080
            - AGENT_ROOM_ENCRYPTION_KEY_B64
            - AGENT_ROOM_ROOT_EMAIL
            - AGENT_ROOM_ROOT_PASSWORD
            - AGENT_ROOM_SESSION_TTL_HOURS
            - AGENT_ROOM_PERF_LOGS
        volumes:
            - agent-room-data:/app/.agent-room
        restart: unless-stopped

volumes:
    postgres-data:
    agent-room-data:
    searxng-config:
