services:
    postgres:
        image: postgres:17-alpine
        container_name: agent-room-postgres
        environment:
            POSTGRES_DB: agent_room
            POSTGRES_USER: agent_room
            POSTGRES_PASSWORD: agent_room
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U agent_room -d agent_room']
            interval: 5s
            timeout: 5s
            retries: 10

    searxng:
        image: searxng/searxng:latest
        container_name: agent-room-searxng
        environment:
            SEARXNG_BASE_URL: http://searxng:8080/
            SEARXNG_SECRET: agent-room-local-search
            SEARXNG_LIMITER: 'false'
            SEARXNG_PUBLIC_INSTANCE: 'false'
        expose:
            - '8080'
        volumes:
            - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
        restart: unless-stopped

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: agent-room-app
        depends_on:
            postgres:
                condition: service_healthy
            searxng:
                condition: service_started
        ports:
            - '3000:3000'
        environment:
            NODE_ENV: production
            PORT: 3000
            DATABASE_URL: postgres://agent_room:agent_room@postgres:5432/agent_room?sslmode=disable
            AGENT_ROOM_DATA_DIR: /app/.agent-room
            AGENT_ROOM_SEARCH_BACKEND_URL: http://searxng:8080
        volumes:
            - agent-room-data:/app/.agent-room
        restart: unless-stopped

volumes:
    postgres-data:
    agent-room-data:
