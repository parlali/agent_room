name: Cloudflare Hosted Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
            AGENT_ROOM_EMAIL_WEBHOOK_URL: ${{ secrets.AGENT_ROOM_EMAIL_WEBHOOK_URL }}
            AGENT_ROOM_EMAIL_WEBHOOK_BEARER_TOKEN: ${{ secrets.AGENT_ROOM_EMAIL_WEBHOOK_BEARER_TOKEN }}
            AGENT_ROOM_EMAIL_FROM: ${{ secrets.AGENT_ROOM_EMAIL_FROM }}
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
              with:
                  bun-version: 1.3.13

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build hosted Worker
              run: bun run self-hosted:cloudflare:build

            - name: Ensure Cloudflare resources
              run: bun run self-hosted:cloudflare:resources

            - name: Apply D1 migrations
              run: bun run self-hosted:cloudflare:d1:migrate

            - name: Deploy hosted Worker and Containers
              run: bun run self-hosted:cloudflare:deploy:built
