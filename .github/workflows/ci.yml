name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check
              run: bun run check

            - name: Root sandbox isolation check
              run: docker run --rm --user 0:0 -v "$PWD":/work -w /work oven/bun:1.3.13 bun run vitest run src/server/rooms/runtime-sandbox-identity.test.ts
