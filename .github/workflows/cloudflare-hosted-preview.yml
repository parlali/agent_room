name: Cloudflare Hosted Preview

on:
    workflow_dispatch:
        inputs:
            pr_number:
                description: Preview PR number
                required: true
                type: string
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - closed

jobs:
    deploy:
        if: ${{ vars.CLOUDFLARE_HOSTED_PREVIEWS_ENABLED == 'true' && github.event.action != 'closed' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository) }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
            pull-requests: read
        environment:
            name: hosted-preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
        steps:
            - name: Checkout preview resolver
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.repository.default_branch }}
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
              with:
                  bun-version: 1.3.13

            - name: Resolve preview target
              id: preview
              env:
                  PREVIEW_PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
                  CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
                  GITHUB_TOKEN: ${{ github.token }}
              run: bun run apps/self-hosted/scripts/cloudflare-hosted-preview-input.ts

            - name: Checkout preview ref
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  ref: ${{ steps.preview.outputs.head_sha }}
                  persist-credentials: false

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build hosted Worker
              run: bun run self-hosted:cloudflare:build

            - name: Ensure preview Cloudflare resources
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
                  AGENT_ROOM_CLOUDFLARE_WORKER_NAME: ${{ steps.preview.outputs.worker_name }}
                  AGENT_ROOM_CLOUDFLARE_D1_DATABASE_NAME: ${{ steps.preview.outputs.d1_database_name }}
                  AGENT_ROOM_CLOUDFLARE_R2_BUCKET_NAME: ${{ steps.preview.outputs.r2_bucket_name }}
                  AGENT_ROOM_CLOUDFLARE_QUEUE_NAME: ${{ steps.preview.outputs.queue_name }}
                  AGENT_ROOM_CLOUDFLARE_ROUTE_PATTERN: ''
              run: bun run self-hosted:cloudflare:resources

            - name: Apply preview D1 migrations
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
                  AGENT_ROOM_CLOUDFLARE_WORKER_NAME: ${{ steps.preview.outputs.worker_name }}
                  AGENT_ROOM_CLOUDFLARE_D1_DATABASE_NAME: ${{ steps.preview.outputs.d1_database_name }}
                  AGENT_ROOM_CLOUDFLARE_R2_BUCKET_NAME: ${{ steps.preview.outputs.r2_bucket_name }}
                  AGENT_ROOM_CLOUDFLARE_QUEUE_NAME: ${{ steps.preview.outputs.queue_name }}
                  AGENT_ROOM_CLOUDFLARE_ROUTE_PATTERN: ''
              run: bun run self-hosted:cloudflare:d1:migrate

            - name: Deploy preview Worker and Containers
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
                  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_HOSTED_PREVIEW_SECRET || secrets.BETTER_AUTH_SECRET }}
                  BETTER_AUTH_URL: ${{ steps.preview.outputs.url }}
                  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_HOSTED_PREVIEW_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
                  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_HOSTED_PREVIEW_CLIENT_SECRET || secrets.GOOGLE_CLIENT_SECRET }}
                  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_HOSTED_PREVIEW_SECRET_KEY || secrets.STRIPE_SECRET_KEY }}
                  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_HOSTED_PREVIEW_WEBHOOK_SECRET || secrets.STRIPE_WEBHOOK_SECRET }}
                  AGENT_ROOM_HOSTED_ENCRYPTION_KEY_B64: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_ENCRYPTION_KEY_B64 || secrets.AGENT_ROOM_HOSTED_ENCRYPTION_KEY_B64 }}
                  AGENT_ROOM_EMAIL_WEBHOOK_URL: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_EMAIL_WEBHOOK_URL || secrets.AGENT_ROOM_EMAIL_WEBHOOK_URL }}
                  AGENT_ROOM_EMAIL_WEBHOOK_BEARER_TOKEN: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_EMAIL_WEBHOOK_BEARER_TOKEN || secrets.AGENT_ROOM_EMAIL_WEBHOOK_BEARER_TOKEN }}
                  AGENT_ROOM_EMAIL_FROM: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_EMAIL_FROM || secrets.AGENT_ROOM_EMAIL_FROM }}
                  AGENT_ROOM_HOSTED_OPENROUTER_API_KEY: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_OPENROUTER_API_KEY || secrets.AGENT_ROOM_HOSTED_OPENROUTER_API_KEY }}
                  AGENT_ROOM_HOSTED_BRAVE_API_KEY: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_BRAVE_API_KEY || secrets.AGENT_ROOM_HOSTED_BRAVE_API_KEY }}
                  AGENT_ROOM_HOSTED_BROWSERBASE_API_KEY: ${{ secrets.AGENT_ROOM_HOSTED_PREVIEW_BROWSERBASE_API_KEY || secrets.AGENT_ROOM_HOSTED_BROWSERBASE_API_KEY }}
                  AGENT_ROOM_CLOUDFLARE_WORKER_NAME: ${{ steps.preview.outputs.worker_name }}
                  AGENT_ROOM_CLOUDFLARE_D1_DATABASE_NAME: ${{ steps.preview.outputs.d1_database_name }}
                  AGENT_ROOM_CLOUDFLARE_R2_BUCKET_NAME: ${{ steps.preview.outputs.r2_bucket_name }}
                  AGENT_ROOM_CLOUDFLARE_QUEUE_NAME: ${{ steps.preview.outputs.queue_name }}
                  AGENT_ROOM_CLOUDFLARE_ROUTE_PATTERN: ''
              run: bun run self-hosted:cloudflare:deploy:built

            - name: Publish preview summary
              run: |
                  echo "### Cloudflare hosted preview" >> "$GITHUB_STEP_SUMMARY"
                  echo "${{ steps.preview.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

    teardown:
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && vars.CLOUDFLARE_HOSTED_PREVIEWS_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
        steps:
            - name: Checkout preview resolver
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
              with:
                  ref: ${{ github.event.repository.default_branch }}
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
              with:
                  bun-version: 1.3.13

            - name: Resolve preview target
              id: preview
              env:
                  PREVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
                  CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
                  GITHUB_TOKEN: ${{ github.token }}
              run: bun run apps/self-hosted/scripts/cloudflare-hosted-preview-input.ts

            - name: Tear down preview resources
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_HOSTED_PREVIEW_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
                  WORKER_NAME: ${{ steps.preview.outputs.worker_name }}
                  D1_DATABASE_NAME: ${{ steps.preview.outputs.d1_database_name }}
                  R2_BUCKET_NAME: ${{ steps.preview.outputs.r2_bucket_name }}
                  QUEUE_NAME: ${{ steps.preview.outputs.queue_name }}
                  CONTAINER_APP_NAME: ${{ steps.preview.outputs.worker_name }}-agentroomruntimecontainer
              run: |
                  set +e
                  echo "Tearing down preview resources for ${WORKER_NAME}"
                  printf 'yes\n' | bun x wrangler delete --name "${WORKER_NAME}"
                  CONTAINER_APP_ID=$(bun x wrangler containers list 2>/dev/null | grep -F "${CONTAINER_APP_NAME}" | awk -F'│' '{gsub(/ /,"",$2); print $2}')
                  if [ -n "${CONTAINER_APP_ID}" ]; then
                      printf 'yes\n' | bun x wrangler containers delete "${CONTAINER_APP_ID}"
                  fi
                  printf 'yes\n' | bun x wrangler d1 delete "${D1_DATABASE_NAME}"
                  printf 'yes\n' | bun x wrangler r2 bucket delete "${R2_BUCKET_NAME}"
                  printf 'yes\n' | bun x wrangler queues delete "${QUEUE_NAME}"
                  echo "Preview teardown complete (best-effort)"
                  exit 0
