services:
    postgres:
        image: postgres:17-alpine
        container_name: agent-room-empty-postgres
        environment:
            POSTGRES_DB: agent_room
            POSTGRES_USER: agent_room
            POSTGRES_PASSWORD: ${AGENT_ROOM_POSTGRES_PASSWORD:-agent_room_local_only}
        volumes:
            - empty-postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U agent_room -d agent_room']
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: agent-room-empty-app
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - '127.0.0.1:${AGENT_ROOM_EMPTY_VERIFY_PORT:-3100}:3000'
        environment:
            - NODE_ENV=production
            - PORT=3000
            - DATABASE_URL=postgres://agent_room:${AGENT_ROOM_POSTGRES_PASSWORD:-agent_room_local_only}@postgres:5432/agent_room?sslmode=disable
            - AGENT_ROOM_DATA_DIR=/app/.agent-room
            - AGENT_ROOM_ENCRYPTION_KEY_B64
            - AGENT_ROOM_ROOT_EMAIL
            - AGENT_ROOM_ROOT_PASSWORD
            - AGENT_ROOM_SESSION_TTL_HOURS
        volumes:
            - empty-agent-room-data:/app/.agent-room
        restart: unless-stopped

volumes:
    empty-postgres-data:
    empty-agent-room-data:
